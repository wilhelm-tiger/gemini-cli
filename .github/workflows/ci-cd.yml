name: CI/CD

on:
  push:
    branches:
      - 'master'
      - 'main'
      - 'release/**'
  pull_request:
    branches:
      - 'master'
      - 'main'
      - 'release/**'
  merge_group:
  workflow_dispatch:
    inputs:
      branch_ref:
        description: 'Branch to run on'
        required: true
        default: 'master'
        type: 'string'

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: |-
    ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/') }}

permissions:
  actions: 'read'
  checks: 'write'
  contents: 'write'
  pull-requests: 'write'
  security-events: 'write'
  statuses: 'write'

jobs:
  ci:
    name: 'Run CI'
    uses: ./.github/workflows/ci.yml
    with:
      branch_ref: ${{ github.event.inputs.branch_ref || github.ref }}
    secrets: inherit


  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # ratchet:pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # ratchet:actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: docs-site
        run: pnpm install --frozen-lockfile

      - name: Build Docusaurus
        working-directory: docs-site
        run: pnpm build

      - name: Deploy to gh-pages
        #if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@329bcc8f12caed2cefe5a5b80781499a6f3b361b # ratchet:peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-site/build
          publish_branch: gh-pages
          cname: gemini.chiori.io
          commit_message: "docs: deploy docusaurus to gh-pages [skip ci]"
